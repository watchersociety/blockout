appId: com.wassermanproductions.blockout
productName: Blockout
directories:
  output: release
files:
  - out/**
  - package.json
  # ffmpeg-static is external to the main bundle — ship the real package
  # (the binary is what makes exports work on machines without ffmpeg).
  - node_modules/ffmpeg-static/**
asarUnpack:
  - node_modules/ffmpeg-static/**
mac:
  category: public.app-category.video
  icon: build/icon.icns
  target:
    - target: dmg
      arch: [arm64, x64]
  # Unsigned by default. For distribution beyond your own machines, set
  # identity + notarize (Apple Developer ID) — see README "Sharing builds".
  identity: null
win:
  target: nsis
linux:
  target: AppImage
  category: Video
npmRebuild: false
