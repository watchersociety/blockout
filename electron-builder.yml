appId: com.wassermanproductions.blockout
productName: Blockout
directories:
  output: release
files:
  - out/**
  - package.json
asarUnpack:
  - node_modules/ffmpeg-static/**
mac:
  category: public.app-category.video
  target:
    - target: dmg
      arch: [arm64, x64]
  # Unsigned by default. For distribution beyond your own machines, set
  # identity + notarize (Apple Developer ID) — see README "Sharing builds".
  identity: null
win:
  target: nsis
linux:
  target: AppImage
  category: Video
npmRebuild: false
